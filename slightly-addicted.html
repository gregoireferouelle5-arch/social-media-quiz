<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Result – Slightly Addicted</title>
  <style>
    :root {
      --accent:       #f5c842;
      --accent-glow:  rgba(245, 200, 66, 0.55);
      --accent-mid:   rgba(245, 200, 66, 0.30);
      --accent-soft:  rgba(245, 200, 66, 0.08);
      --neon-blue:    #4a9eff;
      --neon-blue-gl: rgba(74, 158, 255, 0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .card {
      position: relative;
      background: #111118;
      border: 1.5px solid rgba(255,255,255,0.50);
      border-radius: 16px;
      padding: 52px 44px 44px;
      max-width: 620px; width: 100%;
      text-align: center;
      box-shadow:
        0 0 8px  2px var(--neon-blue-gl),
        0 0 22px 5px rgba(74,158,255,0.28),
        0 0 55px 12px rgba(74,158,255,0.14),
        0 0 40px 8px var(--accent-soft),
        0 24px 60px rgba(0,0,0,0.80);
    }
    .card::before {
      content: '';
      position: absolute;
      top: -2px; left: 50%;
      transform: translateX(-50%);
      width: 56%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--neon-blue) 70%, transparent);
      border-radius: 2px;
      box-shadow: 0 0 12px 3px var(--accent-mid), 0 0 12px 3px var(--neon-blue-gl);
      pointer-events: none;
    }
    .title {
      font-size: 2rem; font-weight: 700;
      letter-spacing: -0.02em; color: #fff;
      text-shadow: 0 0 20px rgba(74,158,255,0.3);
      margin-bottom: 32px;
    }
    .score-label {
      font-size: 0.8rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: #8a8c96;
      margin-bottom: 8px;
    }
    .score-value {
      font-size: 3.6rem; font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 14px var(--accent-glow), 0 0 32px var(--accent-mid);
      line-height: 1; margin-bottom: 32px;
    }
    .divider {
      width: 55%; height: 1px; margin: 0 auto 32px;
      background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--neon-blue) 60%, transparent);
      box-shadow: 0 0 8px var(--accent-mid);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--accent-soft);
      border: 1px solid rgba(245,200,66,0.40);
      border-radius: 50px; padding: 10px 28px;
      margin-bottom: 28px;
      box-shadow: 0 0 16px var(--accent-mid), inset 0 0 10px rgba(245,200,66,0.05);
    }
    .badge-emoji { font-size: 1.4rem; }
    .badge-text {
      font-size: 1.05rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.05em;
      text-shadow: 0 0 10px var(--accent-glow), 0 0 22px var(--accent-mid);
    }
    .description {
      font-size: 0.97rem; color: #c0c2cc;
      line-height: 1.75; margin-bottom: 36px;
    }
    .confirmation {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: #8a8c96; letter-spacing: 0.04em;
      border-top: 1px solid rgba(96,98,108,0.25);
      padding-top: 20px; width: 100%; justify-content: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">Your Result</p>
    <p class="score-label">Your score</p>
    <p class="score-value" id="score">— / 35</p>
    <div class="divider"></div>
    <div class="badge">
      <span class="badge-emoji">🙂</span>
      <span class="badge-text">Slightly Addicted</span>
    </div>
    <p class="description">
      You use social media regularly, but you are still in control.<br/>
      Be careful not to let it take too much time from your daily activities.
    </p>
    <div class="confirmation">
      <span class="dot"></span>
      Your responses have been successfully submitted. Thank you!
    </div>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const s = p.get('score');
    if (s !== null) document.getElementById('score').textContent = s;
  </script>
</body>
</html>
