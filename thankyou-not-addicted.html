<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Result</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0f;
      color: #ffffff;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Carte principale ── */
    .card {
      position: relative;
      background: #111118;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      padding: 48px 40px 40px;
      max-width: 620px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 8px  2px rgba(74, 158, 255, 0.45),
        0 0 22px 5px rgba(74, 158, 255, 0.28),
        0 0 55px 12px rgba(74, 158, 255, 0.14),
        0 0 100px 20px rgba(45, 125, 210, 0.10),
        /* halo vert doux en plus */
        0 0 40px 8px rgba(52, 211, 120, 0.10),
        0 24px 60px rgba(0, 0, 0, 0.75);
      overflow: visible;
    }

    /* Liseré LED haut — mélange bleu + vert */
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 58%;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(52, 211, 120, 0.8) 20%,
        #4a9eff 50%,
        rgba(52, 211, 120, 0.8) 80%,
        transparent
      );
      border-radius: 2px;
      box-shadow:
        0 0 10px 2px rgba(74, 158, 255, 0.5),
        0 0 10px 2px rgba(52, 211, 120, 0.4);
      pointer-events: none;
    }

    /* ── Titre "Your Result" ── */
    .title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
      margin-bottom: 28px;
    }

    /* ── Score ── */
    .score-label {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a8c96;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 3.2rem;
      font-weight: 800;
      color: #34d378;
      text-shadow:
        0 0 12px rgba(52, 211, 120, 0.8),
        0 0 28px rgba(52, 211, 120, 0.4);
      line-height: 1;
      margin-bottom: 28px;
    }

    /* ── Séparateur ── */
    .divider {
      width: 60%;
      height: 1px;
      margin: 0 auto 28px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(52, 211, 120, 0.5) 30%,
        rgba(74, 158, 255, 0.5) 70%,
        transparent
      );
      box-shadow: 0 0 6px rgba(52, 211, 120, 0.2);
    }

    /* ── Badge résultat ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(52, 211, 120, 0.08);
      border: 1px solid rgba(52, 211, 120, 0.4);
      border-radius: 50px;
      padding: 10px 24px;
      margin-bottom: 28px;
      box-shadow:
        0 0 14px rgba(52, 211, 120, 0.18),
        inset 0 0 10px rgba(52, 211, 120, 0.06);
    }

    .badge-emoji {
      font-size: 1.4rem;
      line-height: 1;
    }

    .badge-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: #34d378;
      letter-spacing: 0.04em;
      text-shadow:
        0 0 8px rgba(52, 211, 120, 0.7),
        0 0 18px rgba(52, 211, 120, 0.3);
    }

    /* ── Description ── */
    .description {
      font-size: 0.97rem;
      color: #c0c2cc;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .description strong,
    .description em {
      color: #ffffff;
    }

    /* ── Message confirmation ── */
    .confirmation {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: #8a8c96;
      letter-spacing: 0.04em;
      border-top: 1px solid rgba(96, 98, 108, 0.25);
      padding-top: 20px;
      width: 100%;
      justify-content: center;
    }

    .confirmation-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d378;
      box-shadow: 0 0 6px rgba(52, 211, 120, 0.8);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <p class="title">Your Result</p>

    <p class="score-label">Your score</p>
    <p class="score-value">{calcul}</p>

    <div class="divider"></div>

    <div class="badge">
      <span class="badge-emoji">😌</span>
      <span class="badge-text">Not Addicted</span>
    </div>

    <p class="description">
      You have a healthy relationship with social media.<br/>
      You use it in a balanced way and it does not negatively impact your daily life.
    </p>

    <div class="confirmation">
      <span class="confirmation-dot"></span>
      Your responses have been successfully submitted. Thank you!
    </div>

  </div>
</body>
</html>
